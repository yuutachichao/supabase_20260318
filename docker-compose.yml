version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: supabase-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: .
    container_name: supabase-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=nomic-embed-text
    depends_on:
      - ollama

volumes:
  ollama_data:
